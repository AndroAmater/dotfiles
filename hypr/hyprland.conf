$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$makoConfig = $HOME/.config/hypr/mako/config
$wallpaper = $HOME/.config/dotfiles/background.png

monitor = , preferred, auto, 1

env = XDG_CURRENT_DESKTOP,Hyprland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swaybg -m fill -i $wallpaper
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = mako --config $makoConfig
exec-once = nm-applet
exec-once = swayidle -w before-sleep "swaylock -f"

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    layout = dwindle
    col.active_border = rgba(6e98ebff)
    col.inactive_border = rgba(474747ff)
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = no
}

dwindle {
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

windowrule[float-nm-connection-editor] {
    match:class = ^nm-connection-editor$
    float = yes
}

windowrule[float-pavucontrol] {
    match:class = ^(org\.pulseaudio\.pavucontrol|pavucontrol)$
    float = yes
}

bind = $mainMod, Return, exec, kitty
bind = $mainMod, C, exec, cursor --disable-gpu --disable-gpu-compositing
bind = $mainMod, B, exec, chromium
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod CTRL, L, exec, swaylock -f
bind = $mainMod, Q, killactive

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

bind = $mainMod, F, fullscreen
bind = $mainMod, E, layoutmsg, togglesplit
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, S, exec, $scriptsDir/ensure-floating-pinned

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod SHIFT, C, exec, hyprctl reload

bind = $mainMod, R, submap, resize
submap = resize
bind = , H, resizeactive, -10 0
bind = , J, resizeactive, 0 10
bind = , K, resizeactive, 0 -10
bind = , L, resizeactive, 10 0
bind = , left, resizeactive, -10 0
bind = , down, resizeactive, 0 10
bind = , up, resizeactive, 0 -10
bind = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , escape, submap, reset
bind = $mainMod, R, submap, reset
submap = reset

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

bind = , Print, exec, $scriptsDir/screenshot full file
bind = $mainMod, Print, exec, $scriptsDir/screenshot window file
bind = $mainMod, P, exec, $scriptsDir/screenshot area file
bind = CTRL, Print, exec, $scriptsDir/screenshot full clipboard
bind = $mainMod CTRL, Print, exec, $scriptsDir/screenshot window clipboard
bind = CTRL SHIFT, Print, exec, $scriptsDir/screenshot area clipboard
